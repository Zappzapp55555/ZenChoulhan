<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<title>Cerveau Droit</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  :root{
    --bg:#05060a;
    --bg2:#0b0e18;
    --gold:#c9a86a;
    --gold-dim:#8a7550;
    --gray:#cfd3da;
    --gray-dim:#6b7280;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background:var(--bg); color:var(--gray);
    font-family:-apple-system, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior:none; touch-action:manipulation;
  }
  #app{ position:fixed; inset:0; overflow:hidden; }
  .screen{
    position:absolute; inset:0;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    padding:24px; text-align:center;
  }
  .screen.active{ display:flex; }

  /* ---- HOME ---- */
  #home, #modules{
    justify-content:flex-start; overflow-y:auto; padding:36px 24px 60px;
    background:var(--bg);
  }
  .home-title{
    font-size:15px; letter-spacing:4px; color:var(--gold-dim);
    text-transform:uppercase; margin-bottom:22px; font-weight:300;
  }
  .home-section{ width:100%; max-width:340px; margin-bottom:22px; }
  .home-section-label{
    font-size:10.5px; letter-spacing:2px; color:var(--gray-dim);
    text-transform:uppercase; text-align:left; margin:0 0 8px 4px; font-weight:400;
  }
  .home-btn{
    width:100%; padding:16px 18px; margin-bottom:10px;
    background:var(--bg2); border:1px solid #1c2130; border-radius:14px;
    color:var(--gold); font-size:15.5px; font-weight:400; letter-spacing:0.3px;
    text-align:left; display:flex; align-items:center; gap:14px;
  }
  .home-btn .ico{ font-size:19px; opacity:0.85; width:24px; text-align:center; flex-shrink:0; }
  .home-btn .sub{ display:block; font-size:11.5px; color:var(--gray-dim); margin-top:2px; font-weight:300; }

  /* ---- ACCUEIL : colonnes Zen (gauche) / Torah (droite) ---- */
  .home-cols{ display:flex; gap:14px; width:100%; max-width:420px; }
  .home-col{ flex:1; display:flex; flex-direction:column; gap:11px; min-width:0; }
  .home-col-label{
    font-size:13.5px; letter-spacing:2px; color:var(--gray-dim); text-transform:uppercase;
    text-align:center; margin-bottom:3px;
  }
  .home-btn-compact{
    width:100%; padding:19px 8px; background:var(--bg2); border:1px solid #1c2130; border-radius:14px;
    color:var(--gold); font-size:15.5px; font-weight:400; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:9px; line-height:1.3;
  }
  .home-btn-compact .ico{ font-size:27px; opacity:0.85; }

  .back{
    order:99; margin-top:22px; flex-shrink:0;
    display:flex; align-items:center; gap:6px;
    background:var(--bg2); border:1px solid #1c2130; border-radius:20px;
    color:var(--gray-dim); font-size:13px; font-weight:400; padding:9px 16px 9px 13px; line-height:1;
  }
  .back .back-ico{ font-size:15px; line-height:1; }
  .back:active{ color:var(--gold); border-color:var(--gold); }

  /* ---- SOS BUREAU ---- */
  #sos{ background:#000; }
  .breath-wrap{ position:relative; width:220px; height:220px; display:flex; align-items:center; justify-content:center; }
  .breath-circle{
    position:absolute; border-radius:50%;
    background:radial-gradient(circle at 50% 45%, rgba(201,168,106,0.55), rgba(201,168,106,0.06) 70%);
    width:70px; height:70px;
    transition:transform 5s cubic-bezier(.45,0,.55,1), opacity 5s ease;
  }
  .breath-circle.expand{ transform:scale(3.1); opacity:1; }
  .breath-circle.contract{ transform:scale(1); opacity:0.6; }
  .breath-word{
    position:relative; z-index:2; font-size:19px; color:var(--gold); letter-spacing:2px;
    font-weight:300; opacity:0.95; transition:opacity 1s ease;
  }
  .sos-hint{ margin-top:56px; font-size:12px; color:var(--gray-dim); max-width:260px; font-weight:300; }

  /* ---- RITUEL PRÉ-RÉUNION ---- */
  #ritual{ background:#000; }
  .ritual-steps{ display:flex; gap:8px; margin-bottom:24px; }
  .ritual-dot{ width:7px; height:7px; border-radius:50%; background:#1c2130; }
  .ritual-dot.active{ background:var(--gold); }
  .ritual-dot.done{ background:var(--gold-dim); }
  .ritual-timer{ font-size:32px; color:var(--gold); font-weight:300; letter-spacing:1px; margin-bottom:12px; }
  .ritual-phase-title{ font-size:15px; color:var(--gold); letter-spacing:1px; margin-bottom:10px; }
  .ritual-text{ font-size:13px; color:var(--gray-dim); max-width:280px; line-height:1.7; font-weight:300; margin-bottom:16px; min-height:70px; }
  .ritual-breath-wrap{ position:relative; width:170px; height:170px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
  .ritual-start-pick{ padding:11px 20px; background:var(--bg2); border:1px solid #1c2130; border-radius:30px; color:var(--gold); font-size:12.5px; margin-bottom:18px; }
  .ritual-controls{ display:flex; gap:14px; margin-top:8px; }
  .ritual-btn{ padding:10px 20px; border-radius:20px; background:var(--bg2); border:1px solid #1c2130; color:var(--gray-dim); font-size:12.5px; }
  .sos-toggle{
    margin-top:22px; font-size:12px; color:var(--gray-dim); border:1px solid #222; border-radius:20px;
    padding:8px 16px;
  }

  /* ---- ZMANIOT ---- */
  #zmanim{ justify-content:flex-start; overflow-y:auto; padding:56px 20px 40px; }
  .zman-header{ text-align:center; margin-bottom:14px; }
  .zman-city{ font-size:11px; letter-spacing:1px; color:var(--gray-dim); }
  .zman-hebrew-date{ font-size:16px; color:var(--gold); margin-top:6px; }
  .zman-parasha{ font-size:11px; color:var(--gray-dim); margin-top:3px; }
  .zman-list{ width:100%; max-width:320px; margin-top:10px; }
  .zman-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 2px; border-bottom:0.5px solid #14161f; direction:rtl;
  }
  .zman-name{ font-size:13px; color:var(--gray); display:flex; align-items:center; gap:6px; }
  .zman-time{ font-size:13px; color:var(--gold); }
  .zman-bell{ font-size:13px; opacity:0.3; }
  .zman-bell.on{ opacity:1; }
  .zman-row.past{ opacity:0.4; }
  .zman-row.next{
    background:#241a08; border:0.5px solid #6b4d1a; border-radius:8px;
    padding:11px 8px; margin:2px 0;
  }
  .zman-row.next .zman-name, .zman-row.next .zman-time{ color:#f0c987; font-weight:500; }
  .zman-tag{
    font-size:9px; background:#6b4d1a; color:#f0c987; padding:2px 6px;
    border-radius:8px; direction:ltr; margin-right:4px;
  }
  .zman-note{ font-size:10.5px; color:var(--gray-dim); margin-top:16px; text-align:center; max-width:280px; }
  .zman-status{ font-size:11px; color:var(--gray-dim); margin-top:10px; text-align:center; }

  /* ---- LAUNCHER ---- */
  #launcher{ gap:16px; }
  .game-btn{
    width:100%; max-width:340px; padding:26px 20px;
    background:var(--bg2); border:1px solid #1c2130; border-radius:14px;
    color:var(--gray); font-size:16px; letter-spacing:0.5px;
  }

  /* ---- NIGOUNIM ---- */
  #nigounim{ gap:14px; }
  .file-pick{
    padding:14px 22px; background:var(--bg2); border:1px solid #1c2130; border-radius:30px;
    color:var(--gold); font-size:14px;
  }
  #playlist{ width:100%; max-width:340px; max-height:170px; overflow-y:auto; margin:8px 0; }
  .track{
    padding:10px 14px; border-radius:8px; font-size:13px; color:var(--gray-dim);
    text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .track.playing{ color:var(--gold); }
  .player-controls{ display:flex; gap:20px; align-items:center; margin-top:6px; }
  .player-btn{
    width:58px; height:58px; border-radius:50%; background:var(--bg2);
    border:1px solid #1c2130; color:var(--gold); font-size:20px;
    display:flex; align-items:center; justify-content:center;
  }
  .timer-note{ font-size:11px; color:var(--gray-dim); margin-top:10px; font-weight:300; }

  /* ---- CANVAS COMMON (fond clair volontaire) ---- */
  .light-screen{ background:#f4f2ee; color:#333; }
  .light-screen .back{ background:#fff; border-color:#ddd; color:#999; }
  .light-screen .back:active{ color:var(--gold); border-color:var(--gold); }
  .canvas-hint{
    position:absolute; top:60px; left:0; right:0; text-align:center;
    font-size:13px; color:#8a8a8a; font-weight:300; letter-spacing:1px; z-index:5;
  }
  .full-canvas{ position:absolute; inset:0; touch-action:none; }
  .canvas-action{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    padding:12px 26px; border-radius:30px; background:#fff; border:1px solid #ddd;
    color:#999; font-size:13px; z-index:5;
  }

  /* ---- YIN YOGA ---- */
  #yin{ background:#000; gap:10px; }
  .yin-illus{ width:130px; height:108px; margin-bottom:2px; animation:yinBreathe 6s ease-in-out infinite; }
  .yin-illus svg{ width:100%; height:100%; }
  .yin-illus circle{ fill:none; stroke:var(--gold); stroke-width:3; }
  .yin-illus path{ fill:none; stroke:var(--gold); stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
  .yin-illus .pt{ fill:var(--gold); stroke:none; }
  @keyframes yinBreathe{ 0%,100%{ transform:scale(1); opacity:0.8; } 50%{ transform:scale(1.045); opacity:1; } }
  .yin-ring-wrap{ position:relative; width:210px; height:210px; }
  .yin-ring-wrap svg{ width:100%; height:100%; transform:rotate(-90deg); }
  .yin-ring-bg{ fill:none; stroke:#1c2130; stroke-width:4; }
  .yin-ring-fg{ fill:none; stroke:var(--gold); stroke-width:4; stroke-linecap:round; }
  .yin-pose{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:16px; color:var(--gold); font-weight:400; padding:0 20px; text-align:center;
  }
  .yin-cue{ font-size:12.5px; color:var(--gray-dim); max-width:280px; margin-top:26px; font-weight:300; line-height:1.6; }
  .yin-controls{ display:flex; gap:14px; margin-top:26px; }
  .yin-btn{
    padding:10px 20px; border-radius:20px; background:var(--bg2); border:1px solid #1c2130;
    color:var(--gray-dim); font-size:12.5px;
  }

  /* ---- REGARD PÉRIPHÉRIQUE ---- */
  #peripheral{ background:#000; overflow:hidden; }
  .peripheral-glow{
    position:absolute; inset:-20%; border-radius:50%;
    background:radial-gradient(circle, rgba(201,168,106,0.10) 0%, rgba(11,14,24,0.4) 45%, #000 72%);
    animation:peripheralPulse 16s ease-in-out infinite;
  }
  @keyframes peripheralPulse{
    0%,100%{ transform:scale(1); opacity:0.9; }
    50%{ transform:scale(1.25); opacity:1; }
  }
  .peripheral-dot{
    position:relative; width:10px; height:10px; border-radius:50%; background:var(--gold);
    box-shadow:0 0 14px rgba(201,168,106,0.7);
  }
  .peripheral-hint{
    position:absolute; bottom:60px; left:0; right:0; text-align:center;
    font-size:12px; color:var(--gray-dim); font-weight:300; padding:0 30px;
    animation:hintFade 30s ease-in-out infinite;
  }
  @keyframes hintFade{ 0%,8%{opacity:0.9;} 20%,100%{opacity:0;} }

  /* ---- BOL TIBÉTAIN ---- */
  #bowl{ background:#000; }
  .bowl-wrap{ position:relative; width:220px; height:220px; display:flex; align-items:center; justify-content:center; }
  .bowl-ripple{
    position:absolute; border-radius:50%; border:1px solid rgba(201,168,106,0.5);
    width:80px; height:80px; opacity:0; pointer-events:none;
  }
  .bowl-btn{
    position:relative; width:100px; height:100px; border-radius:50%;
    background:radial-gradient(circle at 45% 40%, rgba(201,168,106,0.5), rgba(201,168,106,0.08) 70%);
    border:1px solid #2a2416; color:var(--gold); font-size:13px; letter-spacing:1px;
  }
  .bowl-hint{ margin-top:40px; font-size:12px; color:var(--gray-dim); font-weight:300; }

  /* ---- RESPIRATION ALTERNÉE ---- */
  #altbreath{ background:#000; }
  .alt-track{ position:relative; width:260px; height:70px; display:flex; align-items:center; }
  .alt-dot{
    position:absolute; width:60px; height:60px; border-radius:50%;
    background:radial-gradient(circle at 50% 45%, rgba(201,168,106,0.55), rgba(201,168,106,0.06) 70%);
    top:5px; left:0; transition:left 3s ease-in-out;
  }
  .alt-dot.right{ left:200px; }
  .alt-word{ margin-top:50px; font-size:17px; color:var(--gold); letter-spacing:1px; font-weight:300; }
  .alt-phase{
    margin-top:12px; font-size:13px; color:var(--gray-dim); letter-spacing:3px;
    text-transform:uppercase; font-weight:300; transition:opacity 0.4s ease;
  }

  /* ---- GRIBOUILLAGE LIBRE ---- */
  #doodle{ background:var(--bg); }
  #doodle .canvas-hint{ color:var(--gray-dim); }
  #doodle .canvas-action{ background:var(--bg2); border-color:#1c2130; color:var(--gray-dim); }

  /* ---- MÉTRONOME TACTILE ---- */
  #metronome{ background:#000; }
  .metro-dot{
    width:64px; height:64px; border-radius:50%;
    background:radial-gradient(circle at 45% 40%, rgba(201,168,106,0.55), rgba(201,168,106,0.08) 70%);
    border:1px solid #2a2416; transition:transform 0.6s ease;
  }
  .metro-dot.pulse{ transform:scale(1.35); }
  .metro-ripple{
    position:absolute; border-radius:50%; border:1px solid rgba(201,168,106,0.4);
    width:64px; height:64px; opacity:0; pointer-events:none;
  }
  .metro-wrap{ position:relative; width:160px; height:160px; display:flex; align-items:center; justify-content:center; }
  .metro-hint{ margin-top:40px; font-size:12px; color:var(--gray-dim); font-weight:300; }

  /* ---- STIMULATION BILATÉRALE ---- */
  #bilateral{ background:#000; gap:16px; }
  .bilateral-choice-btn{
    width:100%; max-width:300px; padding:20px; border-radius:14px;
    background:var(--bg2); border:1px solid #1c2130; color:var(--gold); font-size:15px;
  }
  .bilateral-choice-btn .sub{ display:block; font-size:11.5px; color:var(--gray-dim); margin-top:4px; font-weight:300; }
  #bilateralRun{ background:#000; }
  .bilateral-track{ position:relative; width:280px; height:80px; margin-top:10px; }
  .bilateral-dot{
    position:absolute; top:10px; left:0; width:60px; height:60px; border-radius:50%;
    background:radial-gradient(circle at 50% 45%, rgba(201,168,106,0.55), rgba(201,168,106,0.06) 70%);
    animation-name:bilateralMove; animation-timing-function:ease-in-out;
    animation-iteration-count:infinite; animation-direction:alternate;
  }
  @keyframes bilateralMove{ from{ transform:translateX(0); } to{ transform:translateX(220px); } }
  .bilateral-label{ margin-top:34px; font-size:13px; color:var(--gray-dim); letter-spacing:1px; font-weight:300; }
  .bilateral-panic{
    position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
    width:calc(100% - 48px); max-width:320px; padding:18px; border-radius:14px;
    background:#3a1414; border:1px solid #5c1f1f; color:#e8a3a3; font-size:14px; letter-spacing:0.5px;
    z-index:6;
  }
  .bilateral-grounding{
    position:absolute; inset:0; background:#000; display:none;
    flex-direction:column; align-items:center; justify-content:center; padding:32px; z-index:8;
  }
  .bilateral-grounding.show{ display:flex; }
  .bilateral-grounding p{
    color:var(--gray); font-size:17px; line-height:1.8; font-weight:300; max-width:300px; margin-bottom:34px;
  }
  .bilateral-home-btn{
    padding:12px 24px; border-radius:24px; background:var(--bg2); border:1px solid #1c2130;
    color:var(--gold-dim); font-size:13px;
  }

  /* ---- RESPIRATION (hub + séances guidées) ---- */
  #breathhub{ justify-content:flex-start; overflow-y:auto; padding:56px 24px 60px; }
  #breathwork{ background:#000; justify-content:flex-start; overflow-y:auto; padding:56px 20px 50px; }
  .bw-title{ font-size:15px; color:var(--gold); letter-spacing:1px; margin-bottom:4px; margin-top:20px; }
  .bw-subtitle{ font-size:11.5px; color:var(--gray-dim); margin-bottom:20px; font-weight:300; }
  .bw-timer{ font-size:12px; color:var(--gray-dim); margin-top:16px; min-height:16px; }
  .bw-status{ font-size:13px; color:var(--gold); margin-top:4px; min-height:18px; }
  .bw-duration-row{ display:flex; gap:10px; margin-top:20px; }
  .bw-duration-btn{ padding:9px 18px; border-radius:18px; background:var(--bg2); border:1px solid #1c2130; color:var(--gray-dim); font-size:12.5px; }
  .bw-instruction{ font-size:13px; color:var(--gray-dim); max-width:300px; line-height:1.7; font-weight:300; margin-top:28px; }

  /* ---- CHOULHAN AROUKH (seif par seif) ---- */
  #choulhanCA, #choulhanMB{ justify-content:flex-start; overflow-y:auto; padding:52px 18px 50px; }
  .ca-header{ text-align:center; margin-bottom:6px; }
  .ca-header .label{ font-size:13px; letter-spacing:2px; color:var(--gold-dim); text-transform:uppercase; }
  .ca-header .ref{ direction:rtl; font-size:12px; color:var(--gray-dim); margin-top:4px; font-family:serif; }
  .ca-header .simtitle{ font-size:10px; color:#4a5060; margin-top:4px; }
  .ca-badge-row{ display:flex; justify-content:center; align-items:center; gap:8px; margin:14px 0 16px; flex-wrap:wrap; }
  .ca-badge{ font-size:10.5px; padding:4px 12px; border-radius:12px; letter-spacing:0.5px; }
  .ca-badge.deoraita{ background:#3a2a08; border:1px solid #6b4d1a; color:#f0c987; }
  .ca-badge.derabbanan{ background:#14202e; border:1px solid #1c3a52; color:#7fb8e0; }
  .ca-badge.permis{ background:#122317; border:1px solid #1f4a2c; color:#8fd0a0; }
  .ca-badge.interdit{ background:#2a1414; border:1px solid #5a2a2a; color:#e08a8a; }
  .ca-badge.theme{ background:#1c2130; border:1px solid #2a3040; color:var(--gray); }

  /* ---- QUIZ CHABBAT ---- */
  #quizList, #quizPlay{ justify-content:flex-start; overflow-y:auto; padding:52px 18px 50px; }
  .quiz-chapter{
    width:100%; max-width:360px; background:var(--bg2); border:1px solid #1c2130; border-radius:14px;
    padding:14px 16px; margin-bottom:10px; text-align:left;
  }
  .quiz-chapter-title{ color:var(--gold); font-size:17px; }
  .quiz-chapter-sub{ color:var(--gray-dim); font-size:13px; margin-top:4px; }
  .quiz-chapter.soon{ opacity:0.45; }
  .quiz-progress{ font-size:13.5px; color:var(--gray-dim); text-align:center; margin-bottom:14px; }
  .quiz-scenario{
    width:100%; max-width:380px; background:var(--bg2); border:1px solid #1c2130; border-radius:14px;
    padding:18px; font-size:18px; color:#cfd3da; line-height:1.65; margin-bottom:16px;
  }
  .quiz-options{ width:100%; max-width:380px; display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .quiz-option{
    padding:14px 18px; border-radius:20px; border:1px solid #1c2130; background:var(--bg2);
    color:var(--gold); font-size:17px; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .quiz-option-label{ flex:1; text-align:center; }
  .quiz-option-icon{ font-size:19px; font-weight:600; min-width:18px; text-align:right; }
  .quiz-option.selected{ border:2px solid var(--gold); }
  .quiz-option.correct{ border:2px solid #1f4a2c; background:#122317; color:#8fd0a0; }
  .quiz-option.wrong{ border:2px solid #5a2a2a; background:#2a1414; color:#e08a8a; }
  .quiz-option.disabled{ pointer-events:none; }
  .quiz-answer{ width:100%; max-width:380px; margin-bottom:14px; }
  .quiz-feedback{ text-align:center; font-size:15.5px; font-weight:500; padding:11px; border-radius:10px; margin-bottom:10px; }
  .quiz-feedback.right{ background:#122317; border:1px solid #1f4a2c; color:#8fd0a0; }
  .quiz-feedback.wrong{ background:#2a1414; border:1px solid #5a2a2a; color:#e08a8a; }
  #quizPlay .ca-badge{ font-size:13.5px; padding:6px 16px; }
  .quiz-score-row{ display:flex; justify-content:center; gap:22px; margin:10px 0; }
  .quiz-score-item{ text-align:center; }
  .quiz-score-num{ font-size:23px; font-weight:600; }
  .quiz-score-num.right{ color:#8fd0a0; }
  .quiz-score-num.wrong{ color:#e08a8a; }
  .quiz-score-label{ font-size:12px; color:var(--gray-dim); margin-top:2px; }
  .quiz-cumul-label{ font-size:12.5px; color:var(--gray-dim); text-transform:uppercase; letter-spacing:1px; text-align:center; margin-top:14px; }
  .quiz-source{ font-size:13px; color:var(--gray-dim); text-align:center; margin:8px 0 6px; font-family:serif; }
  .quiz-explain{
    background:var(--bg2); border:1px solid #1c2130; border-radius:12px; padding:12px 14px;
    font-size:16.5px; color:#cfd3da; line-height:1.6;
  }
  .quiz-howto{
    background:linear-gradient(180deg, rgba(201,168,106,0.08), rgba(201,168,106,0.02));
    border:1px solid #4a3a1c; border-radius:12px; padding:12px 14px; margin-top:10px;
    font-size:15px; color:#f0c987; line-height:1.6;
  }
  .quiz-howto::before{ content:"En pratique — "; font-weight:600; }
  .quiz-modern-view{
    background:linear-gradient(180deg, rgba(150,120,220,0.10), rgba(150,120,220,0.03));
    border:1px solid #4a3570; border-radius:12px; padding:12px 14px; margin-top:10px;
    font-size:15px; color:#c9b8ec; line-height:1.6;
  }
  .quiz-modern-view::before{ content:"Un avis plus souple existe — "; font-weight:600; }
  .quiz-modern-view-attrib{ display:block; margin-top:6px; font-size:12.5px; color:#a08fc9; font-style:italic; }
  .quiz-score{ font-size:16px; color:var(--gold); text-align:center; margin-bottom:16px; }
  .quiz-ai-btn{
    width:100%; max-width:360px; padding:14px; margin-bottom:8px;
    background:#241a08; border:1px solid #6b4d1a; border-radius:20px;
    color:#f0c987; font-size:14.5px; letter-spacing:0.3px;
  }
  .quiz-ai-btn:disabled{ opacity:0.55; }
  .quiz-ai-status{ font-size:12px; color:var(--gray-dim); text-align:center; max-width:340px; line-height:1.55; margin-bottom:14px; }
  .ca-block{ width:100%; max-width:400px; background:var(--bg2); border:1px solid #1c2130; border-radius:14px; padding:16px 16px; margin-bottom:6px; }
  .ca-block-label{ font-size:10px; letter-spacing:1.5px; color:var(--gold-dim); text-transform:uppercase; margin-bottom:10px; }
  /* Bloc repliable (utilisé pour le Michna Beroura) : fermé par défaut, on clique sur le
     libellé pour l'ouvrir/le refermer. */
  .ca-block-label.toggle{ margin-bottom:0; cursor:pointer; display:flex; align-items:center; justify-content:space-between; user-select:none; }
  .ca-block-label.toggle .chevron{ transition:transform 0.2s ease; font-size:11px; }
  .ca-block.collapsed .ca-block-label.toggle .chevron{ transform:rotate(-90deg); }
  .ca-block-collapsible{ display:grid; grid-template-rows:1fr; transition:grid-template-rows 0.25s ease; margin-top:10px; }
  .ca-block.collapsed .ca-block-collapsible{ grid-template-rows:0fr; margin-top:0; }
  .ca-block-collapsible-inner{ overflow:hidden; }
  .ca-he{ direction:rtl; font-size:22px; color:var(--gray); line-height:1.6; font-family:'Times New Roman', serif; text-align:right; margin-bottom:6px; }
  .ca-block.mb .ca-he{ color:#cfd3da; font-size:20px; }
  .ca-fr{ font-size:16.5px; color:#8fd0a0; line-height:1.55; margin-bottom:18px; }
  .ca-block.mb .ca-fr{ color:#7fb8e0; font-size:15.5px; }
  .ca-aram{ color:#e0c9f5; }
  .ca-resume{ width:100%; max-width:400px; text-align:center; font-size:17px; line-height:1.5; color:var(--gold); font-style:italic; margin-bottom:20px; padding:0 8px; }
  .ca-progress{ font-size:10.5px; color:#4a5060; text-align:center; margin:6px 0 16px; }
  .ca-lu-btn{ width:100%; max-width:400px; padding:13px; background:#241a08; border:1px solid #6b4d1a; border-radius:20px; color:#f0c987; font-size:13.5px; letter-spacing:0.5px; margin-bottom:14px; }
  .ca-ai-box{ width:100%; max-width:400px; border:1px solid #4a3a1c; border-radius:16px; padding:16px; margin-bottom:18px; background:linear-gradient(180deg, rgba(201,168,106,0.06), rgba(201,168,106,0.01)); }
  .ca-ai-title{ display:flex; align-items:center; gap:6px; margin-bottom:10px; font-size:11px; letter-spacing:1.5px; color:var(--gold); text-transform:uppercase; }
  .ca-ai-input{ width:100%; background:var(--bg2); border:1px solid #1c2130; border-radius:10px; padding:10px 12px; margin-bottom:10px; font-size:12.5px; color:var(--gray); font-family:inherit; resize:vertical; min-height:44px; }
  .ca-ai-btn{ width:100%; padding:9px; background:#241a08; border:1px solid #6b4d1a; border-radius:16px; color:#f0c987; font-size:12px; }
  .ca-ai-answer{ margin-top:12px; max-height:280px; overflow-y:auto; }
  .ca-ai-msg{ font-size:12.5px; line-height:1.6; margin-bottom:12px; white-space:pre-wrap; }
  .ca-ai-msg:last-child{ margin-bottom:0; }
  .ca-ai-msg.user{ color:var(--gold); }
  .ca-ai-msg.model{ color:var(--gray); }
  .ca-ai-msg.user::before{ content:"Toi — "; color:var(--gold-dim); font-weight:600; }
  .ca-ai-msg.model::before{ content:"Gemini — "; color:var(--gold-dim); font-weight:600; }
  .ca-ai-note{ font-size:10px; color:#4a5060; margin-top:8px; text-align:center; }
  .ca-settings-link{
    font-size:12.5px; color:var(--gold); margin-bottom:10px; padding:8px 16px;
    background:var(--bg2); border:1px solid #6b4d1a; border-radius:16px;
  }

  /* ---- RÉGLAGES ---- */
  #settings{ justify-content:flex-start; overflow-y:auto; padding:56px 24px 60px; }
  .settings-label{ font-size:11px; letter-spacing:1px; color:var(--gray-dim); text-transform:uppercase; margin-bottom:8px; align-self:flex-start; }
  .settings-input{ width:100%; max-width:340px; background:var(--bg2); border:1px solid #1c2130; border-radius:10px; padding:12px 14px; margin-bottom:8px; color:var(--gray); font-size:13px; font-family:inherit; }
  .settings-hint{ font-size:11px; color:#4a5060; max-width:320px; line-height:1.6; margin-bottom:24px; }
  .settings-save{ padding:11px 26px; background:#241a08; border:1px solid #6b4d1a; border-radius:20px; color:#f0c987; font-size:13px; margin-bottom:8px; }
  .settings-status{ font-size:12px; color:#8fd0a0; min-height:16px; margin-bottom:10px; }
</style>
</head>

  function b64ToBytes(b64){
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function deriveKey(pin){
    var enc = new TextEncoder();
    return crypto.subtle.importKey("raw", enc.encode(pin), {name:"PBKDF2"}, false, ["deriveKey"])
      .then(function(keyMaterial){
        return crypto.subtle.deriveKey(
          { name:"PBKDF2", salt: b64ToBytes(SALT_B64), iterations: 150000, hash:"SHA-256" },
          keyMaterial,
          { name:"AES-GCM", length:256 },
          false,
          ["decrypt"]
        );
      });
  }

  function decryptPayload(pin){
    return deriveKey(pin).then(function(key){
      return crypto.subtle.decrypt(
        { name:"AES-GCM", iv: b64ToBytes(IV_B64) },
        key,
        b64ToBytes(CIPHERTEXT_B64)
      );
    }).then(function(buf){
      return JSON.parse(new TextDecoder().decode(buf));
    });
  }

  function bootApp(payload){
    appContainer.innerHTML = payload.html;
    var s = document.createElement("script");
    s.textContent = payload.js;
    document.body.appendChild(s);
  }

  function tryUnlock(){
    var pin = input.value;
    if(!pin) return;
    btn.disabled = true;
    decryptPayload(pin).then(function(payload){
      localStorage.setItem("appUnlocked", "true");
      localStorage.setItem("appUnlockCode", pin);
      lockScreen.style.display = "none";
      errorEl.textContent = "";
      bootApp(payload);
    }).catch(function(){
      errorEl.textContent = "Code incorrect.";
      input.value = "";
      input.focus();
      btn.disabled = false;
    });
  }

  btn.addEventListener("click", tryUnlock);
  input.addEventListener("keydown", function(e){ if(e.key === "Enter") tryUnlock(); });
  input.addEventListener("input", function(){
    if(input.value.length === 4){ tryUnlock(); }
  });

  var savedCode = localStorage.getItem("appUnlockCode");
  if(localStorage.getItem("appUnlocked") === "true" && savedCode){
    decryptPayload(savedCode).then(function(payload){
      lockScreen.style.display = "none";
      bootApp(payload);
    }).catch(function(){
      localStorage.removeItem("appUnlocked");
      localStorage.removeItem("appUnlockCode");
    });
  }
})();
